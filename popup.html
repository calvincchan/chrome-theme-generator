<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 350px; font-family: sans-serif; padding: 15px; background: #f5f5f5; }
    .simulator {
      border: 1px solid #ccc; border-radius: 8px; overflow: hidden;
      margin-bottom: 15px; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    /* Dynamic UI Elements */
    #sim-frame { height: 30px; padding: 5px 10px; display: flex; align-items: flex-end; transition: 0.3s; }
    #sim-tab {
      width: 80px; height: 22px; border-radius: 8px 8px 0 0;
      font-size: 10px; display: flex; align-items: center; justify-content: center; transition: 0.3s;
    }
    #sim-toolbar { height: 25px; display: flex; align-items: center; padding-left: 10px; transition: 0.3s; }
    .address-bar { width: 80%; height: 12px; background: rgba(255,255,255,0.5); border-radius: 10px; }

    .controls { display: flex; flex-direction: column; gap: 10px; }
    .palette { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; margin: 10px 0; }
    .swatch { width: 100%; pt: 100%; aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 1px solid rgba(0,0,0,0.1); }
    button { padding: 10px; cursor: pointer; border-radius: 5px; border: none; background: #1a73e8; color: white; font-weight: bold; }
  </style>
</head>
<body>
  <h3>ChromaShift Simulator</h3>
  <div class="simulator">
    <div id="sim-frame">
      <div id="sim-tab">Active Tab</div>
    </div>
    <div id="sim-toolbar">
      <div class="address-bar"></div>
    </div>
  </div>

  <div class="controls">
    <label>Manual Picker: <input type="color" id="manual-picker" value="#1a73e8"></label>
    <div class="palette" id="material-palette"></div>
    <label>Theme Name: <input type="text" id="theme-name" placeholder="My Theme" style="width: 70%;"></label>
    <button id="generate-btn">Download Theme (.zip)</button>
  </div>
  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
